<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width={{width}}, height={{height}}" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: {{width}}px; height: {{height}}px; overflow: hidden; background: #f8fafc; font-family: Arial, sans-serif; color: #0f172a; }
      .root { position: relative; width: 100%; height: 100%; padding: 7%; background: linear-gradient(160deg, #f8fafc, #e2e8f0); }
      .card { height: 100%; border-radius: 28px; background: rgba(255,255,255,.78); border: 1px solid rgba(15,23,42,.08); box-shadow: 0 20px 56px rgba(15,23,42,.14); display: flex; flex-direction: column; justify-content: space-between; padding: 7%; overflow: hidden; }
      .tag { width: max-content; padding: 1.4vw 2.2vw; border-radius: 999px; background: #0f172a; color: #fff; font-size: clamp(12px, 2.2vw, 26px); font-weight: 800; }
      .title { font-size: clamp(34px, 7vw, 90px); line-height: 1.02; font-weight: 900; letter-spacing: 0; max-width: 920px; }
      .body { font-size: clamp(15px, 3vw, 34px); line-height: 1.5; color: #475569; max-width: 820px; }
      .bars { display: grid; gap: 1.6vw; }
      .bar { height: 1.6vw; min-height: 7px; border-radius: 999px; background: #cbd5e1; transform-origin: left; }
      .bar:nth-child(1) { width: 76%; }
      .bar:nth-child(2) { width: 58%; }
      .bar:nth-child(3) { width: 88%; background: #94a3b8; }
    </style>
  </head>
  <body>
    <div id="root" class="root" data-composition-id="main" data-start="0" data-duration="{{duration}}" data-width="{{width}}" data-height="{{height}}">
      <main class="card" id="card">
        <div class="tag" id="tag">社媒短视频</div>
        <div>
          <h1 class="title" id="title">{{title}}</h1>
          <p class="body" id="body">{{body}}</p>
        </div>
        <div class="bars"><div class="bar" id="b1"></div><div class="bar" id="b2"></div><div class="bar" id="b3"></div></div>
      </main>
    </div>
    <script>
      function clamp(x){ return Math.max(0, Math.min(1, x)) }
      function ease(x){ return 1 - Math.pow(1 - clamp(x), 3) }
      function apply(t) {
        const d = {{duration}};
        const p = clamp(t / d);
        card.style.transform = `scale(${.96 + ease(p) * .04})`;
        tag.style.transform = `translateY(${(1 - ease(p * 2)) * -32}px)`;
        title.style.transform = `translateY(${(1 - ease(p * 1.5)) * 42}px)`;
        title.style.opacity = String(clamp(p * 3));
        body.style.opacity = String(clamp((p - .16) * 3));
        b1.style.transform = `scaleX(${ease(p * 1.2)})`;
        b2.style.transform = `scaleX(${ease((p - .1) * 1.3)})`;
        b3.style.transform = `scaleX(${ease((p - .2) * 1.4)})`;
      }
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = { _t: 0, pause(){ return this }, play(){ return this }, seek(t){ this._t = Number(t) || 0; apply(this._t); return this }, totalTime(t){ if (typeof t === 'number') this.seek(t); return this._t }, time(){ return this._t }, duration(){ return {{duration}} }, getChildren(){ return [] } };
      apply(0);
    </script>
  </body>
</html>
